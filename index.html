<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besnik</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        nav {
            position: fixed;
            top: 24px;
            right: 32px;
            display: flex;
            gap: 28px;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover { color: #001f5b; }
        h1 { font-size: 3rem; color: #fff; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>
    <h1>Besnik</h1>
</body>
</html>
